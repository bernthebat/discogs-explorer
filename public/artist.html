<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career River — Discogs</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d0a;
    --surface: #181410;
    --surface2: #221e18;
    --border: #2e2820;
    --gold: #c9a84c;
    --gold-dim: #7a6330;
    --ink: #f0e8d8;
    --ink-mid: #b8aa94;
    --ink-dim: #6a5f4e;
    --red: #c04433;

    --c-performer: #c9a84c;
    --c-composer:  #6aab8c;
    --c-producer:  #8888cc;
    --c-arranger:  #cc8844;
    --c-other:     #888888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink-mid);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 36px 48px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .header-left .artist-meta {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .nav-link {
    font-size: 11px;
    color: var(--ink-dim);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
    transition: color 0.2s;
  }

  .nav-link:hover { color: var(--ink-mid); }

  main { padding: 32px 48px 80px; }

  /* Loading */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    gap: 16px;
  }

  .loading-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--ink-mid);
    font-style: italic;
  }

  .loading-track { width: 300px; height: 1px; background: var(--border); }
  .loading-fill  { height: 1px; background: var(--gold); width: 0%; transition: width 0.4s; }
  .loading-status { font-size: 11px; color: var(--ink-dim); }

  /* Error */
  #error-panel {
    display: none;
    padding: 20px 24px;
    background: rgba(192,68,51,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 12px;
    margin-bottom: 24px;
  }

  /* Artist disambiguation */
  #pick-panel {
    display: none;
    margin-bottom: 32px;
  }

  #pick-panel h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--ink-dim);
    margin-bottom: 12px;
  }

  .pick-list { display: flex; flex-direction: column; gap: 8px; }

  .pick-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .pick-row:hover { border-color: var(--gold-dim); }

  .pick-thumb {
    width: 40px;
    height: 40px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }

  .pick-name { font-size: 13px; color: var(--ink); }
  .pick-detail { font-size: 11px; color: var(--ink-dim); margin-top: 2px; }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 32px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .stat-item .stat-val {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .stat-item .stat-lbl {
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 3px;
  }

  /* Legend + filters */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--ink-dim);
    cursor: pointer;
    transition: color 0.2s;
    user-select: none;
  }

  .legend-item.active { color: var(--ink-mid); }
  .legend-item.inactive { opacity: 0.3; }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .decade-filters {
    display: flex;
    gap: 6px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .decade-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-dim);
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .decade-btn:hover, .decade-btn.active {
    background: var(--surface2);
    border-color: var(--gold-dim);
    color: var(--ink-mid);
  }

  /* River canvas wrapper */
  #river-wrap {
    position: relative;
    width: 100%;
    overflow-x: auto;
    overflow-y: visible;
    padding-bottom: 48px;
  }

  #river-svg {
    display: block;
    min-width: 100%;
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    max-width: 260px;
  }

  #tooltip.visible { opacity: 1; }

  .tt-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .tt-meta { font-size: 11px; color: var(--ink-dim); line-height: 1.6; }
  .tt-role { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 2px; margin-bottom: 4px; }

  /* Bio panel */
  #bio-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 22px 28px;
    margin-bottom: 32px;
  }

  #bio-panel p {
    font-size: 13px;
    color: var(--ink-mid);
    line-height: 1.8;
    max-width: 720px;
  }

  /* Year axis label */
  .year-label {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    fill: var(--ink-dim);
    text-anchor: middle;
  }

  /* Stream label */
  .stream-label {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    fill: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    text-anchor: start;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1 id="artist-name">Loading…</h1>
    <div class="artist-meta" id="artist-meta"></div>
  </div>
  <a href="javascript:history.back()" class="nav-link">← Back</a>
</header>

<main>
  <div id="error-panel"></div>

  <div id="pick-panel">
    <h3>Multiple artists found — which one?</h3>
    <div class="pick-list" id="pick-list"></div>
  </div>

  <div id="loading">
    <div class="loading-title" id="loading-title">Searching for artist…</div>
    <div class="loading-track"><div class="loading-fill" id="loading-fill"></div></div>
    <div class="loading-status" id="loading-status"></div>
  </div>

  <div id="bio-panel"><p id="bio-text"></p></div>

  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-item">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-lbl">Total releases</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="stat-span">—</div>
      <div class="stat-lbl">Career span</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="stat-peak">—</div>
      <div class="stat-lbl">Peak decade</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="stat-countries">—</div>
      <div class="stat-lbl">Countries released in</div>
    </div>
  </div>

  <div class="controls" id="controls" style="display:none">
    <div class="legend" id="legend"></div>
    <div class="decade-filters" id="decade-filters"></div>
  </div>

  <div id="river-wrap" style="display:none">
    <svg id="river-svg"></svg>
  </div>
</main>

<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>

<script>
const ROLE_COLOURS = {
  'Main / Featured': '#c9a84c',
  'Other':           '#888888',
};

const ROLE_COLOURS = {
  'Main / Featured': '#c9a84c',
  'Songwriter':      '#6aab8c',
  'Other':           '#888888',
};

const ROLE_PRIORITY = { 'Main / Featured': 3, 'Songwriter': 2, 'Other': 1 };

function guessRole(roleStr, type) {
  const r = (roleStr || '').toLowerCase().trim();

  // Main or featured artist
  if (r === 'main')              return 'Main / Featured';
  if (r === 'trackappearance')   return 'Main / Featured';
  if (r === 'appearance')        return 'Main / Featured';
  if (r === 'unofficialrelease') return 'Main / Featured';
  if (r.includes('feat') || r.includes('featuring') ||
      r.includes('vocal') || r.includes('voice') || r.includes('singer'))
    return 'Main / Featured';
  if (type === 'main')           return 'Main / Featured';

  // Songwriter / Composer — freeform credit strings
  if (r.includes('written')  || r.includes('writer')   ||
      r.includes('composer') || r.includes('composed') ||
      r.includes('lyrics')   || r.includes('lyricist') ||
      r.includes('music by') || r.includes('words')    ||
      r.includes('text by')  || r.includes('author'))
    return 'Songwriter';

  return 'Other';
}

function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

function setLoading(pct, msg) {
  document.getElementById('loading-fill').style.width = pct + '%';
  document.getElementById('loading-status').textContent = msg;
}

function showError(msg) {
  const el = document.getElementById('error-panel');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
}

// ── Parse artist name from URL params
const params = new URLSearchParams(window.location.search);
const artistName = params.get('artist') || '';
const artistId   = params.get('id')     || '';

document.getElementById('artist-name').textContent = artistName || 'Artist';
document.title = `${artistName} — Career River`;

// ── Active role filters
const activeRoles = new Set(['Main / Featured', 'Songwriter', 'Other']);
let allReleases = [];
let focusDecade = null;

// ── Boot
(async function boot() {
  if (!artistName && !artistId) {
    showError('No artist specified. Go back and click "Dig Deeper" on an artist.');
    return;
  }

  document.getElementById('loading-title').textContent = `Searching for ${artistName}…`;
  setLoading(5, '');

  let resolvedId   = artistId;
  let resolvedName = artistName;
  let profile      = null;

  // Step 1 — resolve artist ID if not provided
  if (!resolvedId) {
    try {
      const resp = await fetch(`/api/artist?action=search&name=${encodeURIComponent(artistName)}`);
      if (!resp.ok) {
        showError(`Search failed with status ${resp.status}`);
        return;
      }
      const data = await resp.json();
      if (data.error) { showError(data.error); return; }
      const results = (data.results || []).filter(r => r.type === 'artist');

      if (results.length === 0) {
        showError(`No artist found on Discogs for "${artistName}".`);
        return;
      }

      // Auto-select if top result title closely matches search name
      const topTitle = (results[0].title || '').toLowerCase().trim();
      const searchLower = artistName.toLowerCase().trim();
      const autoMatch = topTitle === searchLower ||
                        topTitle.startsWith(searchLower) ||
                        searchLower.startsWith(topTitle);

      if (autoMatch || results.length === 1) {
        resolvedId   = results[0].id;
        resolvedName = results[0].title;
      } else {
        // Show disambiguation picker
        document.getElementById('loading').style.display = 'none';
        showPicker(results, (chosen) => {
          resolvedId   = chosen.id;
          resolvedName = chosen.title;
          document.getElementById('pick-panel').style.display = 'none';
          document.getElementById('loading').style.display = 'flex';
          fetchAndRender(resolvedId, resolvedName);
        });
        return;
      }
    } catch(e) {
      showError(`Search failed: ${e.message}`);
      return;
    }
  }

  await fetchAndRender(resolvedId, resolvedName);
})();

function showPicker(results, onPick) {
  const panel = document.getElementById('pick-panel');
  const list  = document.getElementById('pick-list');
  list.innerHTML = '';
  results.slice(0, 5).forEach(r => {
    const row = document.createElement('div');
    row.className = 'pick-row';
    row.innerHTML = `
      ${r.thumb ? `<img class="pick-thumb" src="${r.thumb}" alt="">` : '<div class="pick-thumb"></div>'}
      <div>
        <div class="pick-name">${esc(r.title)}</div>
        <div class="pick-detail">${esc(r.type || '')} ${r.year ? '· ' + r.year : ''}</div>
      </div>`;
    row.onclick = () => onPick(r);
    list.appendChild(row);
  });
  panel.style.display = 'block';
}

async function fetchAndRender(artistId, artistName) {
  document.getElementById('loading').style.display = 'flex';
  setLoading(10, 'Fetching artist profile…');

  // Step 2 — fetch profile
  try {
    const resp = await fetch(`/api/artist?action=profile&id=${artistId}`);
    const data = await resp.json();
    if (data.name) {
      document.getElementById('artist-name').textContent = data.name;
      document.title = `${data.name} — Career River`;

      // Bio — strip HTML tags, truncate
      if (data.profile) {
        const clean = data.profile.replace(/\[.*?\]/g, '').trim();
        if (clean.length > 20) {
          document.getElementById('bio-text').textContent = clean.slice(0, 600) + (clean.length > 600 ? '…' : '');
          document.getElementById('bio-panel').style.display = 'block';
        }
      }

      const members = data.members?.length ? ` · ${data.members.length} members` : '';
      document.getElementById('artist-meta').textContent =
        [data.realname, data.namevariations?.slice(0,2).join(', ')].filter(Boolean).join(' · ') + members;
    }
  } catch(e) { /* profile is optional */ }

  setLoading(20, 'Fetching releases…');

  // Step 3 — fetch all release pages
  const releases = [];
  let page = 1;
  let totalPages = null;

  while (true) {
    try {
      const resp = await fetch(`/api/artist?action=releases&id=${artistId}&page=${page}`);
      if (resp.status === 429) {
        setLoading(20 + (page/Math.max(totalPages||1,1))*70, 'Rate limited — waiting 12s…');
        await sleep(12000);
        continue;
      }
      const data = await resp.json();
      if (data.error) { showError(data.error); return; }

      if (totalPages === null) totalPages = data.pagination?.pages || 1;

      for (const r of data.releases || []) {
        releases.push(r);
      }

      const pct = 20 + Math.round((page / totalPages) * 70);
      setLoading(pct, `Page ${page} of ${totalPages} — ${releases.length} releases found…`);

      if (page >= totalPages || page >= 10) break; // cap at 10 pages = 1000 releases
      page++;
      await sleep(1100);
    } catch(e) {
      showError(`Failed fetching releases: ${e.message}`);
      return;
    }
  }

  setLoading(100, 'Rendering…');
  await sleep(200);

  document.getElementById('loading').style.display = 'none';
  allReleases = releases;
  renderRiver(releases);
}

function buildDiscogsUrl(r) {
  // Use resource_url to derive correct path — avoids master/release ID confusion
  // resource_url looks like: https://api.discogs.com/releases/123 or /masters/456
  if (r.resource_url) {
    const path = r.resource_url
      .replace('https://api.discogs.com', '')
      .replace('/masters/', '/master/')   // API uses /masters/, site uses /master/
      .replace('/releases/', '/release/'); // API uses /releases/, site uses /release/
    return `https://www.discogs.com${path}`;
  }
  // Fallback: use type to pick the right path
  if (r.type === 'master') return `https://www.discogs.com/master/${r.id}`;
  return `https://www.discogs.com/release/${r.id}`;
}

function renderRiver(releases) {
  // ── Filter to releases with a year and map roles
  const mapped = releases
    .filter(r => r.year && parseInt(r.year) > 1900 && parseInt(r.year) <= new Date().getFullYear())
    .map(r => ({
      id:     r.id,
      title:  r.title || 'Unknown',
      year:   parseInt(r.year),
      role:   guessRole(r.role, r.type === 'main' ? 'main' : 'extra'),
      format: r.format || '',
      label:  r.label  || '',
      want:   r.stats?.community?.in_wantlist   || 0,
      have:   r.stats?.community?.in_collection || 0,
      thumb:  r.thumb  || '',
      url:    buildDiscogsUrl(r),
      type:   r.type   || 'release',
    }));

  // ── Deduplicate by ID — keep the entry with the highest priority role
  const byId = {};
  for (const r of mapped) {
    if (!byId[r.id] || ROLE_PRIORITY[r.role] > ROLE_PRIORITY[byId[r.id].role]) {
      byId[r.id] = r;
    }
  }
  const withYear = Object.values(byId);
  window._withYear = withYear; // store for toggleRole

  if (withYear.length === 0) {
    showError('No dated releases found for this artist.');
    return;
  }

  // ── Stats
  const years      = withYear.map(r => r.year);
  const minYear    = Math.min(...years);
  const maxYear    = Math.max(...years);
  const span       = maxYear - minYear;
  const countries  = new Set(withYear.map(r => r.label).filter(Boolean)).size;

  // Peak decade
  const decadeCounts = {};
  withYear.forEach(r => {
    const d = Math.floor(r.year / 10) * 10;
    decadeCounts[d] = (decadeCounts[d] || 0) + 1;
  });
  const peakDecade = Object.entries(decadeCounts).sort((a,b) => b[1]-a[1])[0]?.[0];

  document.getElementById('stat-total').textContent    = withYear.length;
  document.getElementById('stat-span').textContent     = span > 0 ? `${minYear}–${maxYear}` : minYear;
  document.getElementById('stat-peak').textContent     = peakDecade ? peakDecade + 's' : '—';
  document.getElementById('stat-countries').textContent = countries;
  document.getElementById('stats-row').style.display   = 'flex';

  // ── Legend
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';
  Object.entries(ROLE_COLOURS).forEach(([role, colour]) => {
    const count = withYear.filter(r => r.role === role).length;
    if (count === 0) return;
    const item = document.createElement('div');
    item.className = 'legend-item active';
    item.dataset.role = role;
    item.innerHTML = `<div class="legend-dot" style="background:${colour}"></div>${role} <span style="opacity:0.5;margin-left:2px">${count}</span>`;
    item.onclick = () => toggleRole(role);
    legendEl.appendChild(item);
  });

  // ── Decade filter buttons
  const decades = [...new Set(withYear.map(r => Math.floor(r.year/10)*10))].sort();
  const decadeEl = document.getElementById('decade-filters');
  decadeEl.innerHTML = '<span style="font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:1px;margin-right:4px">Decade</span>';
  const allBtn = document.createElement('button');
  allBtn.className = 'decade-btn active';
  allBtn.textContent = 'All';
  allBtn.onclick = () => { focusDecade = null; allBtn.classList.add('active'); document.querySelectorAll('.decade-btn:not(:first-of-type)').forEach(b=>b.classList.remove('active')); drawSVG(withYear, minYear, maxYear); };
  decadeEl.appendChild(allBtn);
  decades.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'decade-btn';
    btn.textContent = d + 's';
    btn.onclick = () => {
      focusDecade = d;
      document.querySelectorAll('.decade-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      drawSVG(withYear, d, d+9);
    };
    decadeEl.appendChild(btn);
  });

  document.getElementById('controls').style.display  = 'flex';
  document.getElementById('river-wrap').style.display = 'block';

  drawSVG(withYear, minYear, maxYear);
}

function toggleRole(role) {
  if (activeRoles.has(role)) activeRoles.delete(role);
  else activeRoles.add(role);
  document.querySelectorAll('.legend-item').forEach(el => {
    el.classList.toggle('active',   activeRoles.has(el.dataset.role));
    el.classList.toggle('inactive', !activeRoles.has(el.dataset.role));
  });
  if (window._withYear) {
    const years  = window._withYear.map(r => r.year);
    const minY   = Math.min(...years);
    const maxY   = Math.max(...years);
    drawSVG(window._withYear, focusDecade || minY, focusDecade ? focusDecade + 9 : maxY);
  }
}

function drawSVG(releases, minYear, maxYear) {
  const filtered = releases.filter(r => activeRoles.has(r.role));

  const STREAM_H    = 110;  // height per role stream
  const PADDING_T   = 40;
  const PADDING_B   = 50;
  const PADDING_L   = 80;
  const PADDING_R   = 40;
  const YEAR_STEP   = 50;   // px per year
  const roles       = [...Object.keys(ROLE_COLOURS)].filter(r => filtered.some(f => f.role === r));
  const numStreams   = Math.max(roles.length, 1);
  const svgH        = PADDING_T + numStreams * STREAM_H + PADDING_B;
  const yearSpan    = Math.max(maxYear - minYear, 1);
  const svgW        = PADDING_L + yearSpan * YEAR_STEP + PADDING_R;

  const svg = document.getElementById('river-svg');
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.setAttribute('width', Math.max(svgW, window.innerWidth - 96));
  svg.setAttribute('height', svgH);
  svg.innerHTML = '';

  const ns = 'http://www.w3.org/2000/svg';

  function xFor(year) {
    return PADDING_L + (year - minYear) / yearSpan * (svgW - PADDING_L - PADDING_R);
  }

  function yForStream(roleIndex) {
    return PADDING_T + roleIndex * STREAM_H + STREAM_H / 2;
  }

  // ── Year axis lines + labels
  const startDecade = Math.ceil(minYear / 5) * 5;
  for (let y = startDecade; y <= maxYear; y += 5) {
    const x = xFor(y);
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', x); line.setAttribute('y1', PADDING_T - 10);
    line.setAttribute('x2', x); line.setAttribute('y2', svgH - PADDING_B + 10);
    line.setAttribute('stroke', y % 10 === 0 ? '#2e2820' : '#1e1c18');
    line.setAttribute('stroke-width', y % 10 === 0 ? '1' : '0.5');
    svg.appendChild(line);

    if (y % 10 === 0) {
      const label = document.createElementNS(ns, 'text');
      label.setAttribute('x', x);
      label.setAttribute('y', svgH - PADDING_B + 28);
      label.setAttribute('class', 'year-label');
      label.textContent = y;
      svg.appendChild(label);
    }
  }

  // ── Stream lanes + labels
  roles.forEach((role, ri) => {
    const cy = yForStream(ri);
    const colour = ROLE_COLOURS[role];

    // lane background
    const lane = document.createElementNS(ns, 'rect');
    lane.setAttribute('x', PADDING_L);
    lane.setAttribute('y', PADDING_T + ri * STREAM_H + 8);
    lane.setAttribute('width', svgW - PADDING_L - PADDING_R);
    lane.setAttribute('height', STREAM_H - 16);
    lane.setAttribute('fill', colour);
    lane.setAttribute('opacity', '0.03');
    svg.appendChild(lane);

    // lane label
    const lbl = document.createElementNS(ns, 'text');
    lbl.setAttribute('x', 8);
    lbl.setAttribute('y', cy + 4);
    lbl.setAttribute('class', 'stream-label');
    lbl.setAttribute('fill', colour);
    lbl.setAttribute('opacity', '0.7');
    lbl.textContent = role;
    svg.appendChild(lbl);
  });

  // ── Place bubbles — simple collision avoidance per year bucket
  const placed = {}; // key: "role_year" → list of y offsets used

  filtered.forEach(r => {
    const ri = roles.indexOf(r.role);
    if (ri < 0) return;

    const cx      = xFor(r.year);
    const baseY   = yForStream(ri);
    const want    = r.want || 0;
    const radius  = Math.max(4, Math.min(22, 4 + Math.log10(want + 1) * 5));

    // Collision avoidance — stack vertically within stream
    const key    = `${r.role}_${r.year}`;
    const used   = placed[key] || [];
    let offsetY  = 0;
    let attempts = 0;
    while (used.some(u => Math.abs(u - offsetY) < radius * 2 + 3) && attempts < 20) {
      offsetY = (attempts % 2 === 0 ? 1 : -1) * Math.ceil((attempts + 1) / 2) * (radius * 2 + 4);
      attempts++;
    }
    used.push(offsetY);
    placed[key] = used;

    const cy = baseY + offsetY;
    const colour = ROLE_COLOURS[r.role];

    // Glow
    const glow = document.createElementNS(ns, 'circle');
    glow.setAttribute('cx', cx); glow.setAttribute('cy', cy);
    glow.setAttribute('r', radius + 4);
    glow.setAttribute('fill', colour);
    glow.setAttribute('opacity', '0.08');
    svg.appendChild(glow);

    // Main circle
    const circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
    circle.setAttribute('r', radius);
    circle.setAttribute('fill', colour);
    circle.setAttribute('opacity', '0.75');
    circle.setAttribute('stroke', colour);
    circle.setAttribute('stroke-width', '0.5');
    circle.style.cursor = 'pointer';

    // Animate in
    circle.style.transformOrigin = `${cx}px ${cy}px`;
    circle.style.animation = `popIn 0.3s ease ${Math.random() * 0.4}s both`;

    circle.addEventListener('mouseenter', (e) => showTooltip(e, r, colour));
    circle.addEventListener('mousemove',  (e) => moveTooltip(e));
    circle.addEventListener('mouseleave', hideTooltip);
    circle.addEventListener('click', () => {
      if (r.url && r.url !== '#') window.open(r.url, '_blank', 'noopener');
    });

    svg.appendChild(circle);

    // Year label on large bubbles
    if (radius >= 10) {
      const txt = document.createElementNS(ns, 'text');
      txt.setAttribute('x', cx); txt.setAttribute('y', cy + 3);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-size', '8');
      txt.setAttribute('fill', '#0f0d0a');
      txt.setAttribute('pointer-events', 'none');
      txt.textContent = r.year;
      svg.appendChild(txt);
    }
  });

  // Add keyframe animation
  if (!document.getElementById('river-anim-style')) {
    const style = document.createElement('style');
    style.id = 'river-anim-style';
    style.textContent = `
      @keyframes popIn {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }
    `;
    document.head.appendChild(style);
  }
}

// ── Tooltip
function showTooltip(e, r, colour) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-title').textContent = r.title;
  let meta = `${r.year}`;
  if (r.label) meta += ` · ${r.label}`;
  if (r.want)  meta += `\n♥ ${r.want} wants`;
  document.getElementById('tt-meta').innerHTML =
    `<span class="tt-role" style="background:${colour}22;color:${colour}">${r.role}</span><br>${meta.replace('\n','<br>')}`;
  tt.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  const x  = e.clientX + 14;
  const y  = e.clientY - 10;
  const w  = tt.offsetWidth;
  const h  = tt.offsetHeight;
  tt.style.left = (x + w > window.innerWidth  ? x - w - 28 : x) + 'px';
  tt.style.top  = (y + h > window.innerHeight ? y - h      : y) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
